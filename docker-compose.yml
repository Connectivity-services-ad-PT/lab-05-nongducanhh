version: '3.8'

networks:
  team-internal:
    driver: bridge

volumes:
  postgres_data:

services:
  # 1. Cơ sở dữ liệu (Database)
  db:
    image: postgres:15-alpine
    container_name: fit4110-db-lab05
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres_password_secret}
      POSTGRES_DB: ${POSTGRES_DB:-smart_campus_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - team-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Dịch vụ AI (AI Service)
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-ai-lab05
    command: ["uvicorn", "ai-service.main:app", "--host", "0.0.0.0", "--port", "9000"]
    ports:
      - "9000:9000"
    environment:
      - APP_PORT=9000
    networks:
      - team-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 3. Dịch vụ chính (API Service)
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fit4110-api-lab05
    ports:
      - "8000:8000"
    env_file:
      - .env.example
    environment:
      - DB_HOST=db
      - AI_SERVICE_HOST=ai-service
    networks:
      - team-internal
    # Đảm bảo DB và AI phải SỐNG và KHỎE MẠNH thì API mới khởi động
    depends_on:
      db:
        condition: service_healthy
      ai-service:
        condition: service_healthy